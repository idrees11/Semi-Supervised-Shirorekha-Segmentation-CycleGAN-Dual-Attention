
# Training Configuration
batch_size: 1
epochs: 100
learning_rate: 0.0001
lambda_cycle: 5.0
lambda_seg: 50.0

# Data Configuration
image_size: 256
paired_ratio: 0.9
train_split: 0.8
val_split: 0.15
test_split: 0.05

# Model Configuration
num_classes: 3
generator_channels: [64, 128, 256, 512]
discriminator_channels: [64, 128, 256, 512]

# Training Configuration
optimizer:
  generator:
    beta1: 0.9
    beta2: 0.999
  discriminator:
    beta1: 0.5
    beta2: 0.999

# Scheduler Configuration
scheduler_generator:
  mode: max
  factor: 0.5
  patience: 10
  min_lr: 1.0e-6

scheduler_discriminator:
  mode: min
  factor: 0.2
  patience: 3
  min_lr: 1.0e-6

# Early Stopping
early_stop_patience: 10
min_epochs: 30

# Paths
data:
  image_dir: "data/images"
  mask_dir: "data/masks"

# Logging
save_checkpoint_freq: 5
visualization_freq: 10
log_freq: 10

# Device
device: "cuda"  # or "cpu"
